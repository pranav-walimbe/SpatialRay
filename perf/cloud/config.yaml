# SpatialRay perf cloud runner configuration.
# These values are substituted into bootstrap.sh before deployment as @@NAME@@ placeholders.

# required: S3 bucket to write result.txt and the _SUCCESS marker into
result_bucket: spatialray-bench-results

# required: IAM instance profile the box assumes (read public S3 data + write result bucket)
instance_profile: spatialray-perf

# run
region: us-west-2
cpu_instance_type: m7i.xlarge
gpu_instance_type: g4dn.xlarge
volume_gb: 80
max_runtime_mins: 30

# AMIs resolved via SSM: AL2023 for cpu, a driver-only Deep Learning AMI supporting G4dn for gpu
cpu_ami_ssm: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
gpu_ami_ssm: /aws/service/deeplearning/ami/x86_64/base-oss-nvidia-driver-gpu-ubuntu-22.04/latest/ami-id

# source repo the box builds
repo_url: https://github.com/pranav-walimbe/SpatialRay.git
repo_branch: main
