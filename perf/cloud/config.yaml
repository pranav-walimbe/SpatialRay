# SpatialRay perf cloud runner configuration
# substituted into bootstrap.sh as @@NAME@@ placeholders

# S3 bucket for result.png and the _SUCCESS marker
result_bucket: spatialray-bench-results

# IAM instance profile granting S3 read and result-bucket write
instance_profile: spatialray-perf

region: us-west-2
volume_gb: 80
max_runtime_mins: 30

repo_url: https://github.com/pranav-walimbe/SpatialRay.git
repo_branch: main

# SSM AMI paths for the cpu and gpu nodes
cpu_ami_ssm: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
gpu_ami_ssm: /aws/service/deeplearning/ami/x86_64/base-oss-nvidia-driver-gpu-ubuntu-22.04/latest/ami-id

# disaggregated Serve cluster one node per stage read by launcher and harness
pools:
  decode:
    instance_type: c6i.xlarge
    ami_ssm: cpu_ami_ssm
    replicas: 3
    num_cpus: 1
  transform:
    instance_type: c6i.2xlarge
    ami_ssm: cpu_ami_ssm
    replicas: 2
    num_cpus: 2
  inference:
    replicas: 1
    cpu:
      instance_type: m7i.xlarge
      ami_ssm: cpu_ami_ssm
      num_cpus: 1
    gpu:
      instance_type: g4dn.xlarge
      ami_ssm: gpu_ami_ssm
      num_cpus: 1
      num_gpus: 1
