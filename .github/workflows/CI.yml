name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - run: uv sync --group dev --extra serve

      - run: uv run ruff check .

      - run: uv run ruff format --check .

      # exit code 5 means no tests were collected, which is not a failure for now
      - name: Tests
        run: uv run pytest || [ $? -eq 5 ]
